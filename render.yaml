services:
  - type: web
    name: shiphny-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./supportbot.db
      - key: PYTHONIOENCODING
        value: utf-8
      - key: DEBUG
        value: "false"
    healthCheckPath: /api/ping
